<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>

    <link rel="stylesheet" href="./admin_dashboard.css" />
    <link rel="stylesheet" href="./admin_dashboard_login_ui.css" />
  </head>
  <body>
    <!-- Login overlay (embedded so admin_dashboard.html itself shows login on refresh/unauth) -->
    <div id="adminLoginOverlay" class="admin-login-overlay" aria-hidden="true">
      <div class="snow" aria-hidden="true"></div>
      <section class="admin-login-card" aria-live="polite">
        <h1 class="admin-login-title">Admin Login</h1>


        <form id="verifyForm" class="admin-login-form" autocomplete="off">
          <label class="admin-login-label" for="twoStepKey">Enter 2-Step Authentication Key:</label>
          <input
            id="twoStepKey"
            name="twoStepKey"
            class="admin-login-input"
            type="password"
            inputmode="numeric"
            placeholder="Enter key"
            required
          />

          <button id="verifyBtn" class="admin-login-btn" type="submit">
            Verify
          </button>

          <p id="message" class="admin-login-message" role="status"></p>
        </form>
      </section>
    </div>

    <div class="app">

      <aside class="sidebar" aria-label="Admin navigation">
        <div class="brand">
          <div class="brand__dot" aria-hidden="true"></div>
          <div class="brand__title">Admin</div>
        </div>

        <nav class="nav" role="navigation">
          <button
            class="nav__item is-active"
            type="button"
            data-view="banquet-management"
          >
            Banquet Management
          </button>
          <button
            class="nav__item"
            type="button"
            data-view="banquet-spreadsheet"
          >
            Banquet Spreadsheet
          </button>
          <button
            class="nav__item"
            type="button"
            data-view="hall-management"
          >
            Hall Management
          </button>
          <button
            class="nav__item"
            type="button"
            data-view="hall-spreadsheet"
          >
            Hall Spreadsheet
          </button>
          <button
            class="nav__item"
            type="button"
            data-view="master-record"
          >
            Master Record
          </button>

        </nav>

        <div class="sidebar__footer">
          <button class="link-btn" id="logoutBtn" type="button">
            Log out
          </button>
        </div>
      </aside>

      <main class="content">
        <header class="topbar">
          <div class="topbar__left">
            <h1 class="topbar__title" id="pageTitle">Banquet Management</h1>
            <p class="topbar__subtitle">Select an option from the left panel.</p>
          </div>

          <div class="topbar__right">
            <div class="pill" id="statusPill">Ready</div>
          </div>
        </header>

        <section class="panel" aria-live="polite">
          <div class="panel__inner">
            <div id="viewContainer">
              <!-- injected by admin_dashboard.js -->
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script type="module" src="./admin_dashboard.js"></script>
    <script type="module" src="./admin_login.js"></script>


    <noscript>
      <meta http-equiv="refresh" content="0; url=./admin_login.html" />
    </noscript>
  </body>
</html>

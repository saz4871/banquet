<!DOCTYPE html>
<html>
<head>
    <title>Banquet Admin Panel</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .form-box { background: #f4f4f4; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        input { display: block; margin: 5px 0; padding: 5px; width: 250px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background-color: #eee; }
    </style>
</head>
<body>

    <h1>Banquet Management</h1>

    <div class="form-box">
        <h3>Add New Entry</h3>
        <input type="text" id="uid" placeholder="UID">
        <input type="text" id="bankName" placeholder="Bank Name">
        <input type="text" id="bankLoc" placeholder="Coordinates (24.86, 67.00)">
        <input type="text" id="bankLocText" placeholder="Location Name">
        <input type="text" id="bankWhatsapp" placeholder="WhatsApp">
        <input type="text" id="vendorUser" placeholder="Vendor User">
        <input type="text" id="vendorPass" placeholder="Vendor Pass">
        <input type="text" id="seasonCost" placeholder="Season Cost">
        <input type="text" id="standardCost" placeholder="Standard Cost">
        <input type="text" id="specialisation" placeholder="Specialisation">
        <input type="text" id="startDate" placeholder="Start Date (YYYY-MM-DD)">
        <input type="text" id="ytLink" placeholder="YouTube Link">
        <input type="text" id="locLink" placeholder="Map Link">
        <input type="text" id="detail" placeholder="Details">
        <button id="addBtn">Save to Database</button>
    </div>

    <h3>All Database Records</h3>
    <table border="1">
        <thead>
            <tr>
                <th>UID</th>
                <th>Name</th>
                <th>Loc Text</th>
                <th>WhatsApp</th>
                <th>User</th>
                <th>Season Cost</th>
                <th>Std Cost</th>
                <th>Details</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script type="module">
        import { database } from './firebaseconfig.js';
        import { ref, get, push, set } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const tableBody = document.getElementById('tableBody');

        async function loadData() {
            const snapshot = await get(ref(database, 'banquet'));
            tableBody.innerHTML = "";
            if (snapshot.exists()) {
                snapshot.forEach((child) => {
                    const d = child.val();
                    tableBody.innerHTML += `<tr>
                        <td>${d.UID || ''}</td>
                        <td>${d.bankname || ''}</td>
                        <td>${d.banklocnametext || ''}</td>
                        <td>${d.bankwhatsapp || ''}</td>
                        <td>${d.vendor_user || ''}</td>
                        <td>${d.seasoncost || ''}</td>
                        <td>${d.standardcost || ''}</td>
                        <td>${d.detail || ''}</td>
                    </tr>`;
                });
            }
        }

        document.getElementById('addBtn').addEventListener('click', async () => {
            const newData = {
                UID: document.getElementById('uid').value,
                bankname: document.getElementById('bankName').value,
                bankloc: document.getElementById('bankLoc').value,
                banklocnametext: document.getElementById('bankLocText').value,
                bankwhatsapp: document.getElementById('bankWhatsapp').value,
                vendor_user: document.getElementById('vendorUser').value,
                vendor_pass: document.getElementById('vendorPass').value,
                seasoncost: document.getElementById('seasonCost').value,
                standardcost: document.getElementById('standardCost').value,
                specialisation: document.getElementById('specialisation').value,
                startdate: document.getElementById('startDate').value,
                ytlink: document.getElementById('ytLink').value,
                loclink: document.getElementById('locLink').value,
                detail: document.getElementById('detail').value
            };

            await set(push(ref(database, 'banquet')), newData);
            alert("Entry Saved!");
            loadData();
        });

        loadData();
    </script>
</body>
</html>

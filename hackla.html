<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Banquet Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
    body{background:radial-gradient(900px 500px at 15% 0%, rgba(255,215,0,.18), transparent 55%),linear-gradient(180deg,#070b17,#0a1024);color:#e5e7eb;min-height:100vh}
    .wrap{max-width:1500px;margin:0 auto;padding:26px 18px 64px}

    .topbar{display:flex;gap:14px;align-items:flex-start;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap}
    .brand{display:flex;flex-direction:column;gap:6px}
    .brand h1{font-size:22px;font-weight:800;color:#fff;letter-spacing:.2px}
    .brand p{color:#9ca3af;font-size:13px;line-height:1.4}

    .pill{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.10);padding:10px 12px;border-radius:14px;color:#cbd5e1;font-size:12.5px;font-weight:700}
    .pill b{color:#fff}

    .card{
      background:rgba(17,24,39,.62);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      box-shadow:0 20px 45px rgba(0,0,0,.35);
      backdrop-filter: blur(10px);
    }

    /* premium layout */
    .layout{
      display:grid;
      grid-template-columns: 520px 1fr;
      gap:18px;
      align-items:start;
      margin-top:10px;
    }

    /* “premium”: panels always distinct, table scroll independent */
    .panel{padding:18px;}
    .tablePanel{padding:14px;}

    /* header */
    .panel h2{color:#ffd700;font-size:15px;letter-spacing:.3px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
    .panel h2 i{filter:drop-shadow(0 0 8px rgba(255,215,0,.25))}

    /* form */
    .form{display:flex;flex-direction:column;gap:12px}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media (max-width:560px){.row2{grid-template-columns:1fr}}

    label{font-size:12px;color:#cbd5e1;font-weight:600;margin-bottom:6px;display:block}
    input,textarea{width:100%;padding:12px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.14);background:#0b1224;color:#f8fafc;outline:none;transition:.2s}
    textarea{min-height:92px;resize:vertical}
    input::placeholder,textarea::placeholder{color:#64748b}
    input:focus,textarea:focus{border-color:rgba(255,215,0,.6);box-shadow:0 0 0 4px rgba(255,215,0,.12)}

    .actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:4px}
    button{cursor:pointer;border:none;transition:.2s;user-select:none}

    .btn-primary{background:linear-gradient(135deg,#ffd700,#ffb300);color:#000;font-weight:900;padding:12px 14px;border-radius:12px;box-shadow:0 12px 25px rgba(255,215,0,.18)}
    .btn-primary:hover{transform:translateY(-2px)}
    .btn-ghost{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.14);color:#e5e7eb;font-weight:800;padding:12px 14px;border-radius:12px}
    .btn-ghost:hover{background:rgba(255,255,255,.07)}

    .hint{margin-top:10px;color:#94a3b8;font-size:12.5px;line-height:1.4}

    /* table */
    .tableHeader{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:10px}
    .search{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.10);padding:10px 12px;border-radius:14px;min-width:280px}
    .search i{color:#ffd700}
    .search input{border:none;background:transparent;padding:0;min-width:220px}
    .search input:focus{box-shadow:none;border:none;outline:none}

    .tableScroll{overflow:auto;border-radius:14px;border:1px solid rgba(255,255,255,.10);background:rgba(0,0,0,.18);max-height:70vh}

    table{width:100%;border-collapse:collapse;min-width:980px}
    thead th{position:sticky;top:0;background:#0c1530;color:#ffd700;font-size:12.5px;letter-spacing:.3px;padding:12px 10px;border-bottom:1px solid rgba(255,255,255,.10);text-align:left;white-space:nowrap}
    tbody td{padding:12px 10px;border-bottom:1px solid rgba(255,255,255,.06);color:#e5e7eb;vertical-align:top;font-size:13px}
    tbody tr:hover td{background:rgba(255,215,0,.06)}

    .cellActions{display:flex;gap:8px;flex-wrap:nowrap;align-items:center}
    .rowCountdown{margin-top:6px;font-size:12px;font-weight:800;letter-spacing:.2px;display:flex;align-items:center;gap:8px}
    .rowCountdown .badge{padding:4px 8px;border-radius:10px;border:1px solid rgba(255,255,255,.14)}

    .rowCountdown.is-green{color:#4ade80}
    .rowCountdown.is-red{color:#f87171}


    .miniBtn{padding:6px 10px;border-radius:10px;font-weight:900;font-size:12px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.03);color:#e5e7eb;white-space:nowrap}

    .miniEdit{background:rgba(56,189,248,.14);border-color:rgba(56,189,248,.35);color:#38bdf8}
    .miniDel{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.32);color:#f87171}
    .miniView{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.32);color:#4ade80}

    .empty{padding:24px;color:#94a3b8;text-align:center;min-width:980px}

    /* images preview */
    .loading-text{font-size:12.5px;color:#ffd700;font-weight:900;display:none;margin-top:10px;}
    .preview-wrapper{display:flex;gap:12px;flex-wrap:wrap;margin-top:14px;padding:14px;background:#0b1120;border-radius:14px;min-height:105px;border:2px dashed rgba(255,215,0,0.25)}
    .thumb-box{width:85px;height:85px;border-radius:12px;overflow:hidden;border:2px solid rgba(255,255,255,0.2);position:relative;cursor:grab;transition:0.2s;}
    .thumb-box.dragging{opacity:0.5;border-color:#ffd700;}
    .thumb-box::after{content:'Gallery';position:absolute;bottom:0;left:0;width:100%;background:rgba(7,11,20,0.9);color:#cbd5e1;font-size:10px;text-align:center;padding:4px 0;font-weight:600;}
    .thumb-box.cover::after{content:'Cover Pic';background:#ffd700;color:#000;font-weight:1000;}
    .thumb-box img{width:100%;height:100%;object-fit:cover;}
    .remove-img-btn{position:absolute;top:4px;right:4px;background:#ef4444;color:white;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;cursor:pointer;border:none;z-index:10;box-shadow:0 2px 5px rgba(0,0,0,0.5);}

    .toast{position:fixed;right:18px;bottom:18px;background:#0b1224;border:1px solid rgba(255,255,255,.14);padding:12px 14px;border-radius:14px;color:#e5e7eb;box-shadow:0 20px 45px rgba(0,0,0,.35);display:none;z-index:999}
    .toast.show{display:block}

    /* 2-step modal auth */
    #twoStepOverlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:2000;background:rgba(3,7,18,.55);backdrop-filter: blur(10px);-webkit-backdrop-filter: blur(10px);}
    #twoStepModal{width:520px;max-width:92%;background:rgba(15,23,42,.96);border:1px solid rgba(255,255,255,.14);border-radius:20px;box-shadow:0 30px 70px rgba(0,0,0,.55);padding:22px 20px;animation:bbModalIn .28s ease-out;}
    @keyframes bbModalIn{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
    .twoStepTitle{color:#ffd700;font-weight:900;letter-spacing:.2px;font-size:18px;display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .twoStepTitle i{filter:drop-shadow(0 0 10px rgba(255,215,0,.25))}
    .twoStepSub{color:#94a3b8;font-size:12.5px;line-height:1.4;margin-bottom:14px}
    .twoStepField label{display:block;color:#cbd5e1;font-size:12px;font-weight:700;margin-bottom:8px}
    .twoStepField input{width:100%;padding:14px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.04);color:#f8fafc;outline:none;transition:.2s}
    .twoStepField input:focus{border-color:rgba(255,215,0,.65);box-shadow:0 0 0 4px rgba(255,215,0,.12)}
    .twoStepActions{display:flex;gap:12px;flex-wrap:wrap;justify-content:flex-end;margin-top:16px}
    .btn-twoStep{cursor:pointer;border:none;border-radius:12px;padding:12px 14px;font-weight:900}
    .btn-confirm{background:linear-gradient(135deg,#ffd700,#ffb300);color:#000;box-shadow:0 12px 25px rgba(255,215,0,.18)}
    .btn-cancel{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.16);color:#e5e7eb}
    .btn-confirm:hover{transform:translateY(-1px)}
    .btn-cancel:hover{background:rgba(255,255,255,.07)}
    #twoStepError{margin-top:10px;color:#f87171;font-size:12.5px;display:none}

    /* responsive: table neeche */
    @media (max-width:1100px){
      .layout{grid-template-columns:1fr;}
      .tableScroll{max-height:55vh;}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <h1>Banquet Management</h1>
              </div>
      <div class="pill"><i class="fa-solid fa-database"></i> Records: <b id="countBadge">0</b></div>
    </div>

    <div class="layout">
      <div class="card panel">
        <h2><i class="fa-solid fa-pen-nib"></i> { CRUD / Upsert } Banquet Record</h2>
        <div class="form" onsubmit="return false">


          <div class="row2">
            <div>
              <label>UID</label>
              <input id="UID" type="text" placeholder="e.g. 12345" />
            </div>
            <div>
              <label>Vendor Username</label>
              <input id="vendor_user" type="text" placeholder="admin_user" />
            </div>
          </div>

          <div class="row2">
          <div>
              <label>Vendor Password</label>
              <input id="vendor_pass" type="text" placeholder="pass123" />
            </div>
            <div>
              <label>Banquet Showcase Name</label>
              <input id="bankname" type="text" placeholder="Grand Hall" />
            </div>
          </div>

          <div class="row2">
            <div>
              <label>User Name (for this UID)</label>
              <input id="user" type="text" placeholder="Noman" />
            </div>
            <div>
              <label>Location Link</label>
              <input id="bankloclink" type="text" placeholder="24.8607, 67.0011 or url" />
            </div>
          </div>
          </div>

          <div>
            <label>Location Link</label>
            <input id="bankloclink" type="text" placeholder="24.8607, 67.0011 or url" />
          </div>

          <div>
            <label>Location Text</label>
            <input id="bankloctext" type="text" placeholder="Main Road, Karachi" />
          </div>


          <div class="row2">
            <div>
              <label>Whatsapp</label>
              <input id="bankwhatsapp" type="text" placeholder="+923001234567" />
            </div>
            <div>
              <label>Start Date</label>
              <input id="startdate" type="date" />
            </div>
          </div>

          <div class="row2">
            <div>
              <label>Weekend Season Rate</label>
              <input id="seasoncost" type="text" placeholder="50000" />
            </div>
            <div>
              <label>Standard Off-Peak Rate</label>
              <input id="standardcost" type="text" placeholder="30000" />
            </div>
          </div>

          <div>
            <label>Specialisation</label>
            <input id="specialisation" type="text" placeholder="Wedding Events" />
          </div>

          <div>
            <label>YouTube Stream Link</label>
            <input id="ytlink" type="text" placeholder="https://youtube.com/..." />
          </div>

          <div>
            <label>Detail</label>
            <textarea id="detail" placeholder="Full description..."></textarea>
          </div>

          <div>
            <label>Picture Upload (4 MAX)</label>
            <input id="imgFile" type="file" accept="image/*" multiple />
            <div class="loading-text" id="imgLoadingNotice">✨ Processing images...</div>
            <div class="preview-wrapper" id="previewContainer"></div>
          </div>

          <div class="actions">
        <button class="btn-primary" id="saveBtn"><i class="fa-solid fa-floppy-disk"></i> Save/Update</button>

            <button class="btn-ghost" id="clearBtn"><i class="fa-solid fa-broom"></i> Clear</button>
          </div>

          <script>
            // make UID uneditable during edit mode until Save/Update or Clear
            (function(){
              const uidEl = document.getElementById('UID');
              const saveBtn = document.getElementById('saveBtn');
              const clearBtn = document.getElementById('clearBtn');

              // called when table Edit button is pressed (we detect it inside delegated click)
              window.__admin2_setUidEditableMode = function({editing}){
                if(!uidEl) return;
                if(editing){
                  uidEl.disabled = true;
                  uidEl.dataset.prevDisabled = 'true';
                } else {
                  uidEl.disabled = false;
                  delete uidEl.dataset.prevDisabled;
                }
              };

              if(saveBtn){
                saveBtn.addEventListener('click', ()=>window.__admin2_setUidEditableMode({editing:false}));
              }
              if(clearBtn){
                clearBtn.addEventListener('click', ()=>window.__admin2_setUidEditableMode({editing:false}));
              }
            })();
          </script>


          
        </div>
      </div>

      <div class="card tablePanel">
        <div class="tableHeader">
          <div class="search">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input id="searchInput" type="text" placeholder="Search by UID / bankname / vendor_user..." />
          </div>
          <div class="pill" title="Firebase path">Path: <b>banquet/unique_bank</b></div>
        </div>

        <div class="tableScroll" style="max-height:70vh; overflow:auto;">
          <table>

            <thead>
              <tr>
                <th style="width:120px">UID</th>
                <th style="width:120px">Cover Image</th>
                <th style="min-width:220px">Banquet Name</th>
                <th style="min-width:220px">User Name</th>
                <th style="min-width:220px">Contact</th>
                <th style="min-width:200px">Vendor Username</th>
                <th style="min-width:200px">Vendor Password</th>
                <th style="min-width:160px">Start Date</th>
                <th style="width:220px">Actions</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>

        <div id="emptyState" class="empty" style="display:none">No records found in Firebase.</div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <!-- 2-Step Auth Modal (Admin2) -->
  <div id="twoStepOverlay" style="display:none">
    <div id="twoStepModal" role="dialog" aria-modal="true" aria-labelledby="twoStepTitle">
      <div class="twoStepTitle" id="twoStepTitle"><i class="fa-solid fa-shield-halved"></i> Enter 2-Step Authentication Key</div>

      <div class="twoStepField">
        <label for="twoStepKey">Authentication Key</label>
        <input id="twoStepKey" type="password" autocomplete="off" placeholder="Enter key" />
      </div>

      <div id="twoStepError"></div>

      <div class="twoStepActions">
        <button class="btn-twoStep btn-cancel" id="twoStepCancel" type="button">Cancel</button>
        <button class="btn-twoStep btn-confirm" id="twoStepConfirm" type="button">Verify</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { database } from "./firebaseconfig.js";
    import { ref, get, set, remove } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    // ---- 2-Step Auth Gate for admin2.html ----
    const twoStepOverlay = document.getElementById('twoStepOverlay');
    const twoStepKeyInput = document.getElementById('twoStepKey');
    const twoStepConfirmBtn = document.getElementById('twoStepConfirm');
    const twoStepCancelBtn = document.getElementById('twoStepCancel');
    const twoStepError = document.getElementById('twoStepError');

    function showTwoStepOverlay(){
      if(!twoStepOverlay) return;
      twoStepError && (twoStepError.style.display = 'none');
      twoStepOverlay.style.display = 'flex';
      // prevent background scroll (best-effort)
      document.documentElement.style.overflow = 'hidden';
      document.body.style.overflow = 'hidden';
      setTimeout(()=>{ try{ twoStepKeyInput && twoStepKeyInput.focus(); }catch{} }, 0);
    }

    function hideTwoStepOverlay(){
      if(!twoStepOverlay) return;
      twoStepOverlay.style.display = 'none';
      document.documentElement.style.overflow = '';
      document.body.style.overflow = '';
    }

    function setTwoStepError(msg){
      if(!twoStepError) return;
      if(!msg){
        twoStepError.style.display = 'none';
        twoStepError.textContent = '';
        return;
      }
      twoStepError.textContent = msg;
      twoStepError.style.display = 'block';
    }

    async function verifyTwoStepKey(){
      try{
        const entered = (twoStepKeyInput?.value || '').trim();
        if(!entered){
          setTwoStepError('Key required.');
          twoStepKeyInput?.focus();
          return;
        }

        // Fetch expected key from Firebase.
        // Source of truth (as per haha.json): banquet/twostepauthkey is directly a value.
        // But we still support object-form just in case.
        const snap = await get(ref(database, 'banquet/twostepauthkey'));
        const val = snap.val();

        // support either string directly OR object with twostepauthkey/key field
        const expected = (val != null && typeof val !== 'object')
          ? val
          : (val?.twostepauthkey ?? val?.key ?? '');


        if(String(entered) === String(expected) && String(expected).trim() !== ''){
          setTwoStepError('');
          hideTwoStepOverlay();
          return;
        }

        setTwoStepError('Invalid key. Redirecting...');
        setTimeout(()=>{ window.location.href = 'login.html'; }, 900);
      }catch(e){
        console.error(e);
        setTwoStepError('Verification failed. Redirecting...');
        setTimeout(()=>{ window.location.href = 'login.html'; }, 900);
      }
    }

    // show immediately on access
    showTwoStepOverlay();

    twoStepConfirmBtn?.addEventListener('click', verifyTwoStepKey);
    twoStepCancelBtn?.addEventListener('click', ()=>{ window.location.href = 'login.html'; });
    twoStepKeyInput?.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') verifyTwoStepKey(); });


    const COLS = [
      "UID","bankname","bankloclink","banktagline","bankloctext","bankwhatsapp",
      "user",
      "vendor_user","vendor_pass","seasoncost","standardcost","specialisation",
      "startdate","ytlink","detail"
    ];

    const tableBody = document.getElementById("tableBody");
    const emptyState = document.getElementById("emptyState");
    const countBadge = document.getElementById("countBadge");
    const toastEl = document.getElementById("toast");

    // Countdown settings (30 days after startdate/back-count)
    const MAX_DAYS = 30;

    // per-row countdown DOM update helpers
    const __countdownIntervals = new Map();

    function startRowCountdown(tr, startdateStr){
      if(!tr) return;
      const el = tr.querySelector('[data-countdown="label"]');
      if(!el) return;

      // cleanup old interval for this row if re-rendered
      const uid = tr.getAttribute('data-uid') || '';
      if(__countdownIntervals.has(uid)){
        clearInterval(__countdownIntervals.get(uid));
        __countdownIntervals.delete(uid);
      }

      const startAt = normalizeDate(startdateStr);
      function render(){
        const now = new Date();
        const remainingDays = computeRemainingDays(startAt, now, MAX_DAYS);

        if(remainingDays <= 0){
          el.textContent = 'Expired';
          el.classList.remove('is-green');
          el.classList.add('is-red');
          return;
        }

        el.textContent = `Remaining: ${remainingDays}d`;
        el.classList.remove('is-red');
        el.classList.add('is-green');
      }

      render();
      const intervalId = setInterval(render, 1000);
      __countdownIntervals.set(uid, intervalId);
    }

    function normalizeDate(dateStr){
      if(!dateStr) return null;
      try{
        // date input usually is yyyy-mm-dd; treat as local midnight to avoid timezone drift
        const m = String(dateStr).match(/^(\d{4})-(\d{2})-(\d{2})$/);
        if(m){
          const y = Number(m[1]);
          const mo = Number(m[2]) - 1;
          const d = Number(m[3]);
          return new Date(y, mo, d, 0, 0, 0, 0);
        }
        const dt = new Date(dateStr);
        if(isNaN(dt.getTime())) return null;
        return dt;
      }catch(e){
        return null;
      }
    }

    function computeRemainingDays(startAt, now, maxDays){
      if(!startAt) return 0;
      // back countdown from start date: window is startAt..startAt+30days
      const diffMs = now.getTime() - startAt.getTime();
      const elapsedDays = Math.floor(diffMs / 86400000);
      const remaining = maxDays - elapsedDays;
      return remaining;
    }

    function toast(msg){

      toastEl.textContent = msg;
      toastEl.classList.add("show");
      clearTimeout(window.__t);
      window.__t = setTimeout(()=>toastEl.classList.remove("show"), 2500);
    }

    function getFormData(){
      const data = {};
      for (const c of COLS) {
        const el = document.getElementById(c);
        if (!el) continue;
        data[c] = (c === "UID") ? el.value.trim() : el.value;
      }

      if (data.startdate && !/^\d{4}-\d{2}-\d{2}$/.test(String(data.startdate))) {
        try { data.startdate = new Date(data.startdate).toISOString().split('T')[0]; } catch {}
      }
      return data;
    }

    function setFormData(obj){
      for (const c of COLS) {
        const el = document.getElementById(c);
        if (!el) continue;
        el.value = (obj && obj[c] != null) ? obj[c] : "";
      }
    }

    function clearForm(){ setFormData({}); }

    function escapeHtml(s){
      return String(s ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","<")
        .replaceAll(">",">")
        .replaceAll('"','"')
        .replaceAll("'","&#039;");
    }

    function cellText(value){
      const v = value ?? "";
      const str = String(v);
      if (str.length > 140) return escapeHtml(str.slice(0,140)) + "…";
      return escapeHtml(str);
    }

    function renderTable(list){
      const scroller = tableBody?.parentElement;
      if (scroller) scroller.scrollTo?.(0,0);

      tableBody.innerHTML = "";
      countBadge.textContent = list.length;

      if (!list.length) {
        emptyState.style.display = "block";
        tableBody.parentElement.style.display = "block";
        return;
      }
      emptyState.style.display = "none";

      for (const item of list) {
        const uid = item.UID || "";
        const tr = document.createElement("tr");
        tr.setAttribute('data-uid', String(uid));
        tr.innerHTML = `
          <td>${escapeHtml(uid)}</td>

          <td style="padding:8px 6px; vertical-align:middle;">
            ${
              (Array.isArray(item.img)
                ? (item.img[0] || "")
                : (item.img || item.cover || item.coverPic))
                ? `<img src="${escapeHtml(Array.isArray(item.img) ? (item.img[0] || "") : (item.img || item.cover || item.coverPic))}" style="width:120px;height:84px;object-fit:cover;border-radius:12px;border:1px solid rgba(255,255,255,.14)" />`
                : "-"
            }
          </td>

          <td>${cellText(item.bankname)}</td>
          <td>${cellText(item.user)}</td>
          <td>${cellText(item.bankwhatsapp)}</td>
          <td>${cellText(item.vendor_user)}</td>
          <td>${cellText(item.vendor_pass)}</td>
          <td>
            ${cellText(item.startdate)}
            <div class="rowCountdown" data-countdown="label" style="margin-top:6px;">Loading…</div>
          </td>
          <td>
            <div class="cellActions">



              <button class="miniBtn miniView" type="button" data-action="view" data-uid="${escapeHtml(uid)}"><i class="fa-regular fa-eye"></i> View</button>
              <button class="miniBtn miniEdit" type="button" data-action="edit" data-uid="${escapeHtml(uid)}"><i class="fa-solid fa-pen-to-square"></i> Edit</button>
              <button class="miniBtn miniDel" type="button" data-action="del" data-uid="${escapeHtml(uid)}"><i class="fa-solid fa-trash-can"></i> Delete</button>
            </div>
          </td>
        `;
    tableBody.appendChild(tr);
      }

      // start/refresh per-row countdowns after DOM is ready
      // (re-render ke baad har row ke interval fresh start hote hain)
      // clear all previous intervals (safety)
      for (const [k, v] of __countdownIntervals.entries()) {
        clearInterval(v);
        __countdownIntervals.delete(k);
      }

      for (const tr of tableBody.querySelectorAll('tr')) {
        const uid = tr.getAttribute('data-uid') || '';
        const record = list.find(r => String(r.UID || '').trim() === String(uid).trim());
        startRowCountdown(tr, record?.startdate);
      }

      window.__allRecords = list;

    }



    async function loadRecords(){
      const snapshot = await get(ref(database, "banquet/unique_bank"));
      const data = snapshot.val() || {};
      const list = [];

      for (const k of Object.keys(data)) {
        const it = data[k] || {};
        list.push({
          UID: it.UID ?? k,
          bankname: it.bankname ?? "",
          bankloclink: it.bankloclink ?? "",
          banktagline: it.banktagline ?? "",
          bankloctext: it.bankloctext ?? "",
          bankwhatsapp: it.bankwhatsapp ?? "",
          user: it.user ?? "",
          vendor_user: it.vendor_user ?? "",
          vendor_pass: it.vendor_pass ?? "",
          seasoncost: it.seasoncost ?? "",
          standardcost: it.standardcost ?? "",
          specialisation: it.specialisation ?? "",
          startdate: it.startdate ?? "",
          ytlink: it.ytlink ?? "",
          detail: it.detail ?? "",
          // store/return cover as `img` + remaining pics as `img2/img3/img4`
          img: it.img ?? it.cover ?? it.coverPic ?? "",
          img2: it.img2 ?? it.img_2 ?? it.image2 ?? it.pic2 ?? "",
          img3: it.img3 ?? it.img_3 ?? it.image3 ?? it.pic3 ?? "",
          img4: it.img4 ?? it.img_4 ?? it.image4 ?? it.pic4 ?? "",
          // optional fields if your backend saves them differently
          imgs: it.imgs ?? it.images ?? ""

        });
      }

      list.sort((a,b)=>String(a.UID).localeCompare(String(b.UID)));
      renderTable(list);
    }

    function applySearch(){
      const q = (document.getElementById("searchInput").value || "").toLowerCase().trim();
      const list = window.__allRecords || [];

      // If search is empty => show all records (also handle case where input contains only spaces)
      if (q === "") return renderTable(list);


      // Match across most visible + important fields
      const filtered = list.filter(r => {
        const uid = String(r.UID ?? "").toLowerCase();
        const bankname = String(r.bankname ?? "").toLowerCase();
        const user = String(r.user ?? "").toLowerCase();
        const whatsapp = String(r.bankwhatsapp ?? "").toLowerCase();
        const vendor_user = String(r.vendor_user ?? "").toLowerCase();
        const vendor_pass = String(r.vendor_pass ?? "").toLowerCase();
        const startdate = String(r.startdate ?? "").toLowerCase();
        const bankloctext = String(r.bankloctext ?? "").toLowerCase();
        const bankloclink = String(r.bankloclink ?? "").toLowerCase();
        const ytlink = String(r.ytlink ?? "").toLowerCase();
        const detail = String(r.detail ?? "").toLowerCase();

        return (
          uid.includes(q) ||
          bankname.includes(q) ||
          user.includes(q) ||
          whatsapp.includes(q) ||
          vendor_user.includes(q) ||
          vendor_pass.includes(q) ||
          startdate.includes(q) ||
          bankloctext.includes(q) ||
          bankloclink.includes(q) ||
          ytlink.includes(q) ||
          detail.includes(q)
        );
      });

      renderTable(filtered);
    }


    document.getElementById("searchInput").addEventListener("input", applySearch);

    document.getElementById("saveBtn").addEventListener("click", async () => {
      const data = getFormData();

      // Validation: blank required fields + format checks for all text fields
      const getFieldLabel = (key) => {
        const map = {
          UID: "UID",
          vendor_user: "Vendor Username",
          vendor_pass: "Vendor Password",
          bankname: "Banquet Showcase Name",
          bankloclink: "Location Link",
          bankloctext: "Location Text",
          bankwhatsapp: "Whatsapp",
          startdate: "Start Date",
          seasoncost: "Weekend Season Rate",
          standardcost: "Standard Off-Peak Rate",
          specialisation: "Specialisation",
          ytlink: "YouTube Stream Link",
          detail: "Detail",
          user: "User Name",
        };
        return map[key] || key;
      };

      const normalizeText = (v) => (v == null ? "" : String(v).trim());

      function isValidUID(v){
        const s = normalizeText(v);
        if(!s) return false;
        return /^[a-zA-Z0-9._-]{3,64}$/.test(s);
      }

      function isLikelyUrl(v){
        const s = normalizeText(v);
        if(!s) return false;
        return /^(https?:\/\/).+/.test(s) || /^(wa\.me\/).+/.test(s);
      }

      function validatePhoneLoose(v){
        const s = normalizeText(v);
        if(!s) return false;
        return /^[+]?([0-9][0-9\s\-]{7,15})$/.test(s);
      }

      function parseMoneyLoose(v){
        const s = normalizeText(v);
        if(!s) return null;
        const cleaned = s.replaceAll(',', '').replaceAll(' ', '');
        const num = Number(cleaned);
        if(!Number.isFinite(num)) return null;
        return num;
      }

      function isValidDateInput(v){
        const s = normalizeText(v);
        if(!s) return false;
        if(!/^\d{4}-\d{2}-\d{2}$/.test(s)) return false;
        return normalizeDate(s) != null;
      }

      const requiredFields = [
        { key: "UID", label: "UID" },
        { key: "vendor_user", label: "Vendor Username" },
        { key: "vendor_pass", label: "Vendor Password" },
        { key: "bankname", label: "Banquet Showcase Name" },
        { key: "bankloclink", label: "Location Link" },
        { key: "bankloctext", label: "Location Text" },
        { key: "bankwhatsapp", label: "Whatsapp" },
        { key: "startdate", label: "Start Date" },
        { key: "seasoncost", label: "Weekend Season Rate" },
        { key: "standardcost", label: "Standard Off-Peak Rate" },
        { key: "specialisation", label: "Specialisation" },
        { key: "ytlink", label: "YouTube Stream Link" },
        { key: "detail", label: "Detail" },
        { key: "user", label: "User Name" }
      ];


      const missing = requiredFields
        .filter(({ key }) => {
          const v = data[key];
          return v == null || String(v).trim() === "";
        })
        .map(({ label }) => label);

      if (missing.length) {
        const listText = missing.map((x) => `- ${x}`).join("\n");
        alert(`Enter the followin fields:\n${listText}`);
        return;
      }



      const path = `banquet/unique_bank/${encodeURIComponent(data.UID)}`;
      const dbRef = ref(database, path);


    // compute+save countdown value in Firebase (daily basis)
      const countdownDate = new Date();
      countdownDate.setHours(0,0,0,0);

      let countdownDays = 0;
      try{
        const startAt = normalizeDate(data.startdate);
        countdownDays = computeRemainingDays(startAt, countdownDate, MAX_DAYS);
        if (!Number.isFinite(countdownDays)) countdownDays = 0;
        countdownDays = Math.max(0, Math.floor(countdownDays));
      }catch(e){
        countdownDays = 0;
      }

      const payload = {
        ...data,
        countdownDays,
        countdownUpdatedAt: new Date().toISOString(),
        img: (uploadedImagesBase64 && uploadedImagesBase64.length) ? uploadedImagesBase64[0] : "",
        // Save remaining pics too, so Edit can re-fetch them (img2/img3/img4)
        img2: (uploadedImagesBase64 && uploadedImagesBase64.length > 1) ? uploadedImagesBase64[1] : "",
        img3: (uploadedImagesBase64 && uploadedImagesBase64.length > 2) ? uploadedImagesBase64[2] : "",
        img4: (uploadedImagesBase64 && uploadedImagesBase64.length > 3) ? uploadedImagesBase64[3] : ""
      };


      try{
        await set(dbRef, payload);
        toast("Saved/Updated ✅");
        clearForm();
        uploadedImagesBase64 = [];
        renderPreviews();
        await loadRecords();
      }catch(e){
        console.error(e);
        toast("Firebase save failed ❌ (check console)");
      }
    });



    // images
    const imgFileInput = document.getElementById("imgFile");
    const imgLoadingNotice = document.getElementById("imgLoadingNotice");
    const previewContainer = document.getElementById("previewContainer");

    let uploadedImagesBase64 = [];
    let imgDragSrcElement = null;

    function compressImageToJpegBase64(file, maxSize = 1280, quality = 0.85) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = () => reject(new Error("File read failed"));
        reader.onload = () => {
          const img = new Image();
          img.onerror = () => reject(new Error("Image load failed"));
          img.onload = () => {
            const canvas = document.createElement("canvas");
            let width = img.width, height = img.height;
            if (width > height) {
              if (width > maxSize) { height = Math.round(height * (maxSize / width)); width = maxSize; }
            } else {
              if (height > maxSize) { width = Math.round(width * (maxSize / height)); height = maxSize; }
            }
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL("image/jpeg", quality));
          };
          img.src = reader.result;
        };
        reader.readAsDataURL(file);
      });
    }

    function renderPreviews(){
      if (!previewContainer) return;
      previewContainer.innerHTML = "";

      uploadedImagesBase64.forEach((pic, index) => {
        const thumb = document.createElement("div");
        thumb.className = "thumb-box" + (index === 0 ? " cover" : "");
        thumb.setAttribute("draggable", "true");
        thumb.setAttribute("data-index", index);

        thumb.innerHTML = `
          <button type="button" class="remove-img-btn" title="Remove" onclick="window.__removeAdmin2Image(${index}, event)">×</button>
          <img src="${pic}" alt="preview image">
        `;

        thumb.addEventListener("dragstart", handleDragStart);
        thumb.addEventListener("dragover", handleDragOver);
        thumb.addEventListener("drop", handleDrop);
        thumb.addEventListener("dragend", handleDragEnd);

        previewContainer.appendChild(thumb);
      });

      window.__removeAdmin2Image = function(idx, event){
        event?.stopPropagation?.();
        uploadedImagesBase64.splice(idx, 1);
        renderPreviews();
      };
    }

    function handleDragStart(e){
      imgDragSrcElement = this;
      this.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
    }
    function handleDragOver(e){ e.preventDefault?.(); return false; }
    function handleDrop(e){
      e.stopPropagation?.();
      if (!imgDragSrcElement || imgDragSrcElement === this) return false;

      const srcIndex = parseInt(imgDragSrcElement.getAttribute("data-index"), 10);
      const targetIndex = parseInt(this.getAttribute("data-index"), 10);
      if (Number.isNaN(srcIndex) || Number.isNaN(targetIndex)) return false;

      const targetElement = uploadedImagesBase64[srcIndex];
      uploadedImagesBase64.splice(srcIndex, 1);
      uploadedImagesBase64.splice(targetIndex, 0, targetElement);
      renderPreviews();
      return false;
    }
    function handleDragEnd(){ this.classList.remove("dragging"); }

    async function onPickImages(input){
      const files = input?.files ? Array.from(input.files) : [];
      if (!files.length) return;

      if (imgLoadingNotice) imgLoadingNotice.style.display = "block";
      try{
        const newPics = [];
        const remaining = Math.max(0, 4 - uploadedImagesBase64.length);
        const filesToProcess = files.slice(0, remaining);
        for (const f of filesToProcess){
          if (!f.type || !f.type.startsWith("image/")) continue;
          newPics.push(await compressImageToJpegBase64(f, 1280, 0.85));
        }
        uploadedImagesBase64 = uploadedImagesBase64.concat(newPics);
        renderPreviews();
      }catch(err){
        console.error(err);
        toast("Image processing failed ❌");
      }finally{
        if (imgLoadingNotice) imgLoadingNotice.style.display = "none";
        input.value = "";
      }
    }

    imgFileInput?.addEventListener("change", ()=>onPickImages(imgFileInput));

    document.getElementById("clearBtn").addEventListener("click", ()=>{
      clearForm();
      uploadedImagesBase64 = [];
      renderPreviews();
      toast("Form cleared");
    });

    tableBody.addEventListener("click", async (e) => {
      const btn = e.target.closest("button[data-action]");
      if (!btn) return;

      const action = btn.dataset.action;
      const uid = btn.dataset.uid;
      const list = window.__allRecords || [];
      const record = list.find(r => String(r.UID) === String(uid));

      if (action === "view" || action === "edit") {
        if (!record) return toast("Record not found.");
        setFormData(record);

        // Load cover (and other uploaded images if available)
        uploadedImagesBase64 = [];

        // Your backend case: img = cover (index 0), and img2/img3/img4 = remaining pics
        // so cover first + then img2/img3/img4 order.
        const img2 = record.img2 ?? "";
        const img3 = record.img3 ?? "";
        const img4 = record.img4 ?? "";

        if (record.img) {
          if (Array.isArray(record.img)) {
            // if somehow backend stores multi in img array, still handle
            uploadedImagesBase64 = record.img.filter(Boolean);
          } else {
            uploadedImagesBase64 = [record.img, img2, img3, img4].filter(Boolean);
          }
        } else if (img2 || img3 || img4) {
          // rare case: cover missing but others exist
          uploadedImagesBase64 = [img2, img3, img4].filter(Boolean);
        }

        // Optional fallback: if `imgs` exists and `img/img2..` not present properly
        if ((!uploadedImagesBase64 || uploadedImagesBase64.length === 0) && record.imgs) {
          if (Array.isArray(record.imgs)) {
            uploadedImagesBase64 = record.imgs.filter(Boolean);
          } else if (typeof record.imgs === 'string' && record.imgs.trim().startsWith('[')) {
            try {
              const arr = JSON.parse(record.imgs);
              if (Array.isArray(arr)) uploadedImagesBase64 = arr.filter(Boolean);
            } catch {}
          }
        }

        renderPreviews();

        toast(action === "view" ? "Loaded (View mode)" : "Edit loaded");

        // if it's edit mode, UID ko uneditable kar do
        if (typeof window.__admin2_setUidEditableMode === 'function') {
          window.__admin2_setUidEditableMode({ editing: action === "edit" });
        }
      }


      if (action === "del") {
        if (!uid) return;
        if (!confirm(`Delete Firebase record with UID: ${uid}?`)) return;
        try{
          await remove(ref(database, `banquet/unique_bank/${encodeURIComponent(uid)}`));
          toast("Deleted ✅");
          await loadRecords();
        }catch(err){
          console.error(err);
          toast("Delete failed ❌");
        }
      }
    });

    await loadRecords();
    gsap.from(".layout", { opacity: 0, y: 14, duration: .35, ease: "power2.out" });
  </script>
</body>

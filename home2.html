<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home | Premium Luxury Banquets & Halls</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
    body{background:radial-gradient(900px 500px at 15% 0%, rgba(255,215,0,.18), transparent 55%),linear-gradient(180deg,#070b17,#0a1024);color:#e5e7eb;min-height:100vh;overflow-x:hidden;zoom:1.25}
    .wrap{max-width:1300px;margin:0 auto;padding:22px 18px 70px}

    .hero{height:42vh;min-height:340px;display:flex;align-items:center;justify-content:center;text-align:center;position:relative;border-radius:26px;overflow:hidden;border:1px solid rgba(255,255,255,.06);background:
      linear-gradient(180deg,rgba(7,11,20,.35),rgba(7,11,20,.88)),
      url('https://images.unsplash.com/photo-1519167758481-83f550bb49b3?auto=format&fit=crop&w=1600&q=80') center/cover;
      box-shadow:0 25px 55px rgba(0,0,0,.35)
    }
    .hero::after{content:'';position:absolute;inset:-2px;background:conic-gradient(from 180deg, rgba(255,215,0,0), rgba(255,215,0,.55), rgba(255,215,0,0));opacity:.25;filter:blur(14px);pointer-events:none}
    .hero-content{position:relative;z-index:2;padding:24px}
    .hero-content h1{font-size:3rem;letter-spacing:.5px;color:#ffd700;font-weight:800;text-shadow:0 10px 35px rgba(0,0,0,.45)}
    .hero-content p{margin-top:12px;color:#a0aec0;font-size:1.05rem}

    /* sticky navbar */
    .home-navbar{position:sticky;top:0;z-index:50;margin-top:18px;background:rgba(7,11,20,0.78);backdrop-filter: blur(16px);border:1px solid rgba(255,255,255,0.06);box-shadow:0 16px 40px rgba(0,0,0,.25);border-radius:18px}
    .home-nav-links{display:flex;gap:26px;justify-content:center;list-style:none;padding:14px 18px;flex-wrap:wrap}
    .home-nav-links a{color:#94a3b8;text-decoration:none;font-weight:700;font-size:15px;padding:10px 18px;border-radius:999px;border:1px solid transparent;transition:.2s}
    .home-nav-links a:hover{color:#ffd700;border-color:rgba(255,215,0,.22);background:rgba(255,215,0,.06)}
    .home-nav-links a.active{color:#000;background:linear-gradient(135deg,#ffd700,#ffb300);border-color:rgba(255,215,0,.65);box-shadow:0 15px 35px rgba(255,215,0,.14)}

    .search-row{margin:18px 0 26px;display:flex;justify-content:center}
    .search-container{width:100%;max-width:780px;display:flex;align-items:center;gap:12px;background:linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.03));padding:12px 16px;border-radius:999px;border:1px solid rgba(255,215,0,0.28);backdrop-filter: blur(14px);box-shadow:0 12px 30px rgba(0,0,0,.35)}
    .search-container i{color:#ffd700;font-size:1.2rem;text-shadow:0 0 18px rgba(255,215,0,.35)}
    .search-container input{width:100%;background:none;border:none;outline:none;color:white;font-size:1.05rem}
    .search-container input::placeholder{color:rgba(255,255,255,0.55)}
    .search-container:focus-within{border-color:rgba(255,215,0,.62);box-shadow:0 18px 50px rgba(0,0,0,.45),0 0 0 3px rgba(255,215,0,.12)}

    .section-header{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap;margin:18px 0}
    .section-header h2{font-size:1.75rem;font-weight:800;color:#fff}
    .section-header h2 span{color:#ffd700}
    .count-pill{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.10);padding:10px 12px;border-radius:14px;color:#cbd5e1;font-weight:800;font-size:13px}

    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}

    .card{
      position:relative;
      background:rgba(255,255,255,0.03);
      border-radius:18px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,0.06);
      cursor:pointer;
      opacity:0;
      transform:translateY(18px);
      transition:transform .35s ease,border-color .25s ease,background .25s ease;
      min-height:320px;
    }
    .card:hover{transform:translateY(-8px);border-color:rgba(255,215,0,.4);background:rgba(255,255,255,0.04)}

    .img-container{height:190px;background:#0b1224;position:relative;overflow:hidden}
    .img-container img{width:100%;height:100%;object-fit:cover;filter:brightness(0.9);transform:scale(1.02);transition:transform .6s ease}
    .card:hover .img-container img{transform:scale(1.08)}
    .luxury-badge{position:absolute;top:14px;left:14px;background:linear-gradient(135deg,#ffd700,#b8860b);color:#000;padding:6px 14px;border-radius:999px;font-size:.78rem;font-weight:900;letter-spacing:.4px;box-shadow:0 12px 30px rgba(0,0,0,.35)}

    .card-body{padding:16px 16px 14px}
    .card-title{font-weight:900;color:white;font-size:1.05rem;line-height:1.25;min-height:52px}
    .card-tag{color:#a0aec0;font-size:.9rem;line-height:1.45;margin-top:8px;min-height:52px}
    .card-footer{display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(255,255,255,.06);padding:12px 16px;gap:10px}
    .price{color:#a0aec0;font-size:.85rem}
    .price b{display:block;color:#ffd700;font-size:1.25rem;margin-top:2px}
    .arrow{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.10);color:#ffd700;transition:.2s}
    .card:hover .arrow{background:#ffd700;color:#000;transform:translateX(4px)}

    .empty{padding:40px 14px;color:#94a3b8;text-align:center;border:1px dashed rgba(255,215,0,.25);border-radius:18px;grid-column:1/-1}

    .toast{position:fixed;right:18px;bottom:18px;background:#0b1224;border:1px solid rgba(255,255,255,.14);padding:12px 14px;border-radius:14px;color:#e5e7eb;box-shadow:0 20px 45px rgba(0,0,0,.35);display:none;z-index:999}
    .toast.show{display:block}

    @media(max-width:560px){.hero-content h1{font-size:2.2rem}.card{min-height:300px}.img-container{height:175px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero" aria-hidden="true">
      <div class="hero-content">
        <h1 id="heroTitle">The Grand Event Vault</h1>
        <p id="heroSubtitle">Curated Luxury & Elite Experiences Beyond Imagination</p>
      </div>
    </div>

    <nav class="home-navbar">
      <ul class="home-nav-links">
        <li><a href="#" id="navBanquets" class="active" onclick="setHomeMode('banquets');return false;">Banquets</a></li>
        <li><a href="#" id="navHalls" onclick="setHomeMode('halls');return false;">Halls</a></li>
      </ul>
    </nav>

    <div class="search-row">
      <div class="search-container">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input id="searchInput" type="text" placeholder="Search banquets/halls by name, tagline, contact..." />
      </div>
    </div>

    <div class="section-header">
      <h2 id="sectionTitle">Available <span>Luxury Spaces</span></h2>
      <div class="count-pill">Cards: <b id="countBadge">0</b></div>
    </div>

    <div id="grid" class="grid"></div>
    <div id="emptyState" class="empty" style="display:none">No items available right now.</div>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module">
    import { database } from "./firebaseconfig.js";
    import { ref, get } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    const toastEl = document.getElementById('toast');
    const gridEl = document.getElementById('grid');
    const emptyStateEl = document.getElementById('emptyState');
    const countBadge = document.getElementById('countBadge');

    const MAX_DAYS = 30;

    let homeMode = 'banquets';
    let allBanquets = [];
    let allHalls = [];

    function toast(msg){
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(window.__toastT);
      window.__toastT = setTimeout(()=>toastEl.classList.remove('show'), 2600);
    }

    function normalizeDate(dateStr){
      if(!dateStr) return null;
      const m = String(dateStr).match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if(m){
        const y = Number(m[1]);
        const mo = Number(m[2]) - 1;
        const d = Number(m[3]);
        return new Date(y, mo, d, 0, 0, 0, 0);
      }
      const dt = new Date(dateStr);
      if(isNaN(dt.getTime())) return null;
      return dt;
    }

    function remainingDays(startAt, now, maxDays){
      if(!startAt) return 0;
      const diffMs = now.getTime() - startAt.getTime();
      const elapsedDays = Math.floor(diffMs / 86400000);
      return maxDays - elapsedDays;
    }

    function formatRs(v){
      const s = String(v ?? '').trim();
      if(!s) return 'Rs. 0';
      return 'Rs. ' + s;
    }

    function pickCover(item){
      return item.img || item.cover || (Array.isArray(item.imagesStack) ? item.imagesStack[0] : '') || '';
    }

    function collectTextForSearch(item){
      const fields = [
        item.uid,
        item.title,
        item.name,
        item.tagline,
        item.tag,
        item.phone,
        item.whatsapp,
        item.vendor_user,
        item.vendor_pass,
        item.detail,
        item.specialisation,
        item.location,
        item.locationLink
      ];
      return fields.filter(Boolean).join(' ').toLowerCase();
    }

    function render(list){
      gridEl.innerHTML = '';
      emptyStateEl.style.display = list.length ? 'none' : 'block';
      countBadge.textContent = list.length;

      if(!list.length) return;

      list.forEach((item, i)=>{
        const card = document.createElement('div');
        card.className = 'card';
        card.setAttribute('role','button');
        card.setAttribute('tabindex','0');
        card.setAttribute('aria-label', `Open ${homeMode} ${item.title || item.uid}`);

        card.addEventListener('click', ()=>openDetails(item.uid));
        card.addEventListener('keydown', (e)=>{ if(e.key==='Enter' || e.key===' ') openDetails(item.uid); });

        const cover = pickCover(item);
        const title = item.title || item.bankname || item.name || item.hallTitle || item.uid;
        const tag = item.tagline || item.tag || item.banktagline || item.detail || item.locationText || '';
        const seasonal = homeMode==='banquets' ? (item.seasoncost || item.seasonalPrice || '') : (item.seasonalPrice || item.seasoncost || item.seasonal || '');
        const price = formatRs(seasonal || item.seasonalPrice || item.seasoncost || item.randomPrice || '0');

        card.innerHTML = `
          <div class="img-container">
            ${cover ? `<img src="${cover}" alt="cover" />` : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#94a3b8">No Image</div>`}
            <div class="luxury-badge">Verified Luxury</div>
          </div>
          <div class="card-body">
            <div class="card-title">${escapeHtml(title)}</div>
            <div class="card-tag">${escapeHtml(tag).slice(0,160)}${String(tag).length>160?'…':''}</div>
          </div>
          <div class="card-footer">
            <div class="price">${homeMode==='banquets' ? 'Starts From' : 'Starts From'}<b>${escapeHtml(price.replace('Rs. ','').trim())}</b></div>
            <div class="arrow"><i class="fa-solid fa-arrow-right"></i></div>
          </div>
        `;

        gridEl.appendChild(card);
        gsap.to(card, { opacity: 1, y: 0, duration: 0.55, delay: i*0.04, ease: 'power2.out' });
      });
    }

    function escapeHtml(s){
      return String(s ?? '')
        .replaceAll('&','&amp;')
        .replaceAll('<','<')
        .replaceAll('>','>')
        .replaceAll('"','"')
        .replaceAll("'",'&#039;');
    }

    function applySearch(){
      const q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
      const base = homeMode==='banquets' ? allBanquets : allHalls;
      if(!q) return render(base);
      const filtered = base.filter(it => collectTextForSearch(it).includes(q));
      render(filtered);
    }

    window.setHomeMode = function(mode){
      homeMode = mode;
      document.getElementById('navBanquets').classList.toggle('active', mode==='banquets');
      document.getElementById('navHalls').classList.toggle('active', mode==='halls');
      document.getElementById('heroTitle').textContent = document.getElementById('heroTitle').textContent;
      document.getElementById('heroSubtitle').textContent = document.getElementById('heroSubtitle').textContent;
      document.getElementById('sectionTitle').innerHTML = mode==='banquets' ? 'Available <span>Luxury Spaces</span>' : 'Available <span>Luxury Halls</span>';
      document.getElementById('searchInput').value = '';
      applySearch();
    }

    function openDetails(uid){
      if(homeMode==='banquets'){
        localStorage.setItem('banquetId', uid);
        localStorage.setItem('banquetData', JSON.stringify(indexById(allBanquets)));
        window.location.href = 'banquet.html';
      }else{
        localStorage.setItem('hallId', uid);
        localStorage.setItem('hallData', JSON.stringify(indexById(allHalls)));
        window.location.href = 'hall.html';
      }
    }

    function indexById(list){
      const obj = {};
      for(const it of list){
        obj[String(it.uid)] = it;
      }
      return obj;
    }

    document.getElementById('searchInput').addEventListener('input', applySearch);

    async function loadBanquets(){
      const snapshot = await get(ref(database, 'banquet/unique_bank'));
      const data = snapshot.val() || {};
      const list = [];
      const now = new Date();

      for(const k of Object.keys(data)){
        const it = data[k] || {};
        const uid = it.UID ?? k;
        const startAt = normalizeDate(it.startdate);
        const rem = remainingDays(startAt, now, MAX_DAYS);
        if(rem <= 0) continue;

        list.push({
          uid: String(uid),
          title: it.bankname || '',
          tagline: it.banktagline || '',
          locationLink: it.bankloclink || '',
          locationText: it.bankloctext || '',
          whatsapp: it.bankwhatsapp || '',
          vendor_user: it.vendor_user || '',
          vendor_pass: it.vendor_pass || '',
          seasoncost: it.seasoncost || '',
          standardcost: it.standardcost || '',
          specialisation: it.specialisation || '',
          startdate: it.startdate || '',
          ytlink: it.ytlink || '',
          detail: it.detail || '',
          img: it.img || it.cover || it.coverPic || '',
          imagesStack: [it.img, it.img2, it.img3, it.img4].filter(Boolean)
        });
      }

      list.sort((a,b)=>a.uid.localeCompare(b.uid));
      allBanquets = list;
    }

    // halls Firebase: main admin panel shows it keeps hall data in localStorage,
    // but hall details page expects hallData from localStorage.
    // Here we attempt common Firebase path patterns used in your project.
    // If your halls path differs, update the path below.
    async function loadHalls(){
      // Try best-effort paths.
      const pathsToTry = [
        'hall/unique_hall',
        'hall/unique_halls',
        'halls/unique_hall',
        'halls/unique_halls',
        'hall/unique_bank',
        'hall/unique_bankroom',
        'hall/unique_bank_hall'
      ];

      let data = null;
      for(const p of pathsToTry){
        try{
          const snap = await get(ref(database, p));
          const v = snap.val();
          if(v && typeof v === 'object' && Object.keys(v).length){
            data = v;
            break;
          }
        }catch(e){
          // ignore
        }
      }

      const list = [];
      const now = new Date();

      if(!data){
        allHalls = [];
        return;
      }

      for(const k of Object.keys(data)){
        const it = data[k] || {};
        const uid = it.UID ?? it.uid ?? k;
        const startAt = normalizeDate(it.startdate || it.startDate);
        const rem = remainingDays(startAt, now, MAX_DAYS);
        if(rem <= 0) continue;

        list.push({
          uid: String(uid),
          title: it.title || it.hallname || it.hallTitle || it.name || it.bankname || '',
          tagline: it.tag || it.hallTag || it.tagline || it.banktagline || '',
          locationLink: it.locationLink || it.location_link || it.hallLocationLink || it.locationLink || '',
          locationText: it.location || it.locationText || it.hallLocationText || '',
          phone: it.phone || it.hallPhone || it.bankwhatsapp || '',
          vendor_user: it.vUser || it.vendor_user || it.vendorUser || it.hallVUser || '',
          vendor_pass: it.vPass || it.vendor_pass || it.vendorPass || it.hallVPass || '',
          seasonalPrice: it.seasonalPrice || it.seasoncost || it.seasonal || '',
          randomPrice: it.randomPrice || it.standardcost || '',
          startdate: it.startdate || it.startDate || '',
          endDate: it.endDate || it.enddate || '',
          detail: it.desc || it.detail || '',
          img: it.img || it.cover || (it.imagesStack && it.imagesStack[0]) || '',
          imagesStack: it.imagesStack || [it.img, it.img2, it.img3, it.img4].filter(Boolean)
        });
      }

      list.sort((a,b)=>a.uid.localeCompare(b.uid));
      allHalls = list;
    }

    function initial(){
      setHomeMode('banquets');
    }

    await loadBanquets();
    // halls best-effort loading (may show empty if path differs)
    await loadHalls();
    initial();
    applySearch();
    gsap.from('.hero-content', { opacity: 0, y: 16, duration: 0.7, ease: 'power2.out' });
    gsap.from('.home-navbar', { opacity: 0, y: 14, duration: 0.5, delay: 0.1, ease: 'power2.out' });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Banquet | Premium Gateway</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
        
        body {
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            background: url('https://images.unsplash.com/photo-1519167758481-83f550bb49b3?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
            position: relative; 
            overflow: hidden; 
            color: white;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(7, 11, 20, 0.85) 0%, rgba(3, 7, 18, 0.65) 100%);
            z-index: 1;
        }

        .container {
            position: relative; 
            z-index: 2; 
            width: 440px; 
            max-width: 92%; 
            padding: 45px 35px; 
            text-align: center;
            border-radius: 30px; 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12); 
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        }

        .logo-wrapper {
            width: 90px; height: 90px; 
            background: linear-gradient(135deg, rgba(255,215,0,0.15) 0%, rgba(255,215,0,0.02) 100%);
            border: 1px solid rgba(255,215,0,0.35); 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 25px auto; 
            box-shadow: 0 0 25px rgba(255,215,0,0.15);
        }
        .logo-wrapper i { font-size: 38px; color: #ffd700; }

        h1 { 
            font-size: 34px; 
            font-weight: 700; 
            letter-spacing: -0.5px; 
            background: linear-gradient(to right, #ffffff, #e2e8f0); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        .subtitle { color: #ffd700; font-size: 13px; margin-bottom: 35px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; }

        .btn {
            width: 100%; padding: 16px; margin: 12px 0; border: none; border-radius: 16px;
            cursor: pointer; font-weight: 600; font-size: 14px; display: flex; align-items: center;
            justify-content: center; gap: 12px; color: white; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
        }
        .btn i { font-size: 16px; transition: transform 0.3s; }
        .btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.25); transform: translateY(-2px); }
        
        .btn.user { background: linear-gradient(135deg, #ffd700, #ffb300); color: #000; font-weight: 700; border: none; box-shadow: 0 10px 25px rgba(255,215,0,0.2); }
        .btn.user:hover { background: linear-gradient(135deg, #ffe033, #ffd700); box-shadow: 0 12px 30px rgba(255,215,0,0.3); transform: translateY(-3px); }

        #popup {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none;
            justify-content: center; align-items: center; background: rgba(3, 7, 18, 0.85);
            backdrop-filter: blur(15px); z-index: 999;
        }
        .login-box {
            width: 420px; max-width: 92%; padding: 40px 35px; border-radius: 28px; position: relative;
            background: rgba(15, 23, 42, 0.95); border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7); animation: popupReveal 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes popupReveal { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .popup-icon {
            width: 70px; height: 70px; margin: 0 auto 20px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            background: rgba(255,215,0,0.08); border: 1px solid rgba(255,215,0,0.2);
        }
        .popup-icon i { font-size: 28px; color: #ffd700; }
        .login-box h2 { text-align: center; margin-bottom: 25px; font-weight: 600; font-size: 22px; }

        .input-group { position: relative; margin-bottom: 16px; }
        .input-group i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #64748b; font-size: 16px; }
        .login-box input {
            width: 100%; padding: 15px 15px 15px 48px; border: none; outline: none; border-radius: 14px;
            background: rgba(255,255,255,0.04); color: white; font-size: 14px; border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.3s;
        }
        .login-box input:focus { border-color: #ffd700; background: rgba(255,255,255,0.07); box-shadow: 0 0 12px rgba(255,215,0,0.1); }

        .login-btn {
            width: 100%; padding: 15px; margin-top: 15px; border: none; border-radius: 14px;
            cursor: pointer; font-weight: 600; color: black; background: linear-gradient(135deg, #ffd700, #ffb300);
            transition: 0.3s; font-size: 15px;
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255,215,0,0.25); }

        .close {
            position: absolute; top: 20px; right: 20px; width: 32px; height: 32px; display: flex;
            justify-content: center; align-items: center; border-radius: 50%; background: rgba(255,255,255,0.05);
            cursor: pointer; font-size: 16px; color: #94a3b8; transition: 0.3s;
        }
        .close:hover { transform: rotate(90deg); background: rgba(255,255,255,0.1); color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-wrapper">
        <i class="fa-solid fa-champagne-glasses"></i>
    </div>
    <h1>Grand Banquet</h1>
    <p class="subtitle">Luxury Event Management Platform</p>

    <button class="btn" onclick="showLogin('Banquet Owner')">
        <i class="fa-solid fa-building-columns"></i> Vendor Premium Suite
    </button>
    <button class="btn user" onclick="showLogin('Guest')">
        <i class="fa-solid fa-arrow-right-to-bracket"></i> View Website
    </button>
</div>

<div id="popup">
    <div class="login-box">
        <span class="close" onclick="closePopup()">&times;</span>
        <div class="popup-icon">
            <i class="fa-solid fa-user-lock" id="popupIcon"></i>
        </div>
        <h2 id="panelTitle">Authorized Gateway</h2>
        
        <div class="input-group">
            <i class="fa-regular fa-user" id="userInputIcon"></i>
            <input type="text" id="accessUsername" placeholder="Access Username">
        </div>
        <div class="input-group">
            <i class="fa-solid fa-shield-halved" id="passInputIcon"></i>
            <input type="password" id="securityToken" placeholder="Security Token Pass">
        </div>
        <button class="login-btn">Secure Login</button>
    </div>
</div>

<script>
// Shortcut key: Ctrl + Alt + L
document.addEventListener('keydown', function(event) {
    if (event.ctrlKey && event.altKey && event.key === 'l') {
        showLogin('Admin');
    }
});

function showLogin(role) {
    document.getElementById("popup").style.display = "flex";
    
    const userInput = document.getElementById("accessUsername");
    const passInput = document.getElementById("securityToken");
    const userIcon = document.getElementById("userInputIcon");
    const passIcon = document.getElementById("passInputIcon");
    const popupIcon = document.getElementById("popupIcon");
    const loginBtn = document.querySelector(".login-btn");

    userInput.value = "";
    passInput.value = "";

    if (role === 'Guest') {
        document.getElementById("panelTitle").innerText = "Guest Registration";
        userInput.placeholder = "Full Name";
        userInput.type = "text";
        passInput.placeholder = "Phone Number";
        passInput.type = "tel"; 
        
        userIcon.className = "fa-regular fa-user";
        passIcon.className = "fa-solid fa-phone";
        popupIcon.className = "fa-solid fa-id-card";
        
        loginBtn.innerText = "Continue to Website";
        loginBtn.setAttribute("onclick", "processGuestVerification()");
    } else {
        document.getElementById("panelTitle").innerText = role + " Portal";
        userInput.placeholder = "Access Username";
        userInput.type = "text";
        passInput.placeholder = "Security Token Pass";
        passInput.type = "password";
        
        userIcon.className = "fa-regular fa-user";
        passIcon.className = "fa-solid fa-shield-halved";
        popupIcon.className = "fa-solid fa-user-lock";
        
        loginBtn.innerText = "Secure Login";
        
        if(role === 'Admin') {
            loginBtn.setAttribute("onclick", "enterAsAdmin()");
        } else {
            loginBtn.setAttribute("onclick", "enterAsVendor()");
        }
    }
}

function closePopup() { 
    document.getElementById("popup").style.display = "none"; 
}

function processGuestVerification() {
    const name = document.getElementById("accessUsername").value.trim();
    const phone = document.getElementById("securityToken").value.trim();

    if (!name || !phone) {
        alert("⚠️ Please fill out both Full Name and Phone Number fields.");
        return;
    }

    localStorage.setItem("userRole", "guest");
    localStorage.setItem("guestName", name);
    localStorage.setItem("guestPhone", phone);

    window.location.href = "home.html";
}

function enterAsAdmin() { 
    const savedPassword = localStorage.getItem("adminPassword") || "admin123";
    const enteredUser = document.getElementById("accessUsername").value.trim();
    const enteredPass = document.getElementById("securityToken").value;

    if (enteredUser === "admin" && enteredPass === savedPassword) {
        localStorage.setItem("userRole", "admin");
        window.location.href = "admin.html";
    } else {
        alert("🚨 Security Token Pass Invalid! Access Denied.");
    }
}

function enterAsVendor() {
    const enteredUser = document.getElementById("accessUsername").value.trim();
    const enteredPass = document.getElementById("securityToken").value.trim();
    
    if(!enteredUser || !enteredPass) {
        alert("⚠️ Username aur Password dono zaruri hain.");
        return;
    }

    const banquetData = JSON.parse(localStorage.getItem("banquetData")) || {};
    const hallData = JSON.parse(localStorage.getItem("hallData")) || {};

    let matched = false;

    // 1) Banquet vendor match
    Object.keys(banquetData).forEach(key => {
        const banquet = banquetData[key];
        if (matched) return;
        if (banquet && banquet.vUser === enteredUser && banquet.vPass === enteredPass) {
            matched = true;
            localStorage.setItem("userRole", "vendor");
            localStorage.setItem("vendorBanquetKey", key);
            localStorage.removeItem("vendorHallKey");
            window.location.href = "vendor.html";
        }
    });

    if (matched) return;

    // 2) Hall vendor match (Admin me hall record me fields: vUser/vPass)
    Object.keys(hallData).forEach(key => {
        const hall = hallData[key];
        if (matched) return;
        if (hall && hall.vUser === enteredUser && hall.vPass === enteredPass) {
            matched = true;
            localStorage.setItem("userRole", "vendor");
            localStorage.setItem("vendorHallKey", key);
            localStorage.removeItem("vendorBanquetKey");
            window.location.href = "vendor.html";
        }
    });

    if (!matched) {
        alert("🚨 Invalid Vendor Credentials! Access Denied.");
    }
}

window.onclick = function(e) { 
    if(e.target.id === "popup") closePopup(); 
}
// Enter key press par login trigger karne wala command
document.addEventListener('keydown', function(event) {
    if (event.key === 'Enter') {
        const popup = document.getElementById("popup");
        if (popup.style.display === "flex") {
            const loginBtn = document.querySelector(".login-btn");
            // Ye check karega ki button ka onclick function kya hai aur use execute karega
            loginBtn.click();
        }
    }
});
</script>
</body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vendor Panel</title>

    <link rel="stylesheet" href="./vendor_panel.css" />
  </head>
  <body>
    <!-- Login overlay (embedded so vendor_panel.html itself shows login on refresh/unauth) -->
    <div id="vendorLoginOverlay" class="vendor-login-overlay" aria-hidden="true">
      <div class="snow" aria-hidden="true"></div>
      <section class="vendor-login-card" aria-live="polite">
        <h1 class="vendor-login-title">Vendor Login</h1>

        <form id="verifyForm" class="vendor-login-form" autocomplete="off">
          <label class="vendor-login-label" for="vendorUsername">Vendor Username:</label>
          <input
            id="vendorUsername"
            name="vendorUsername"
            class="vendor-login-input"
            type="text"
            placeholder="Enter username"
            autocomplete="username"
            required
          />

          <label class="vendor-login-label" for="vendorPassword">Vendor Password:</label>
          <input
            id="vendorPassword"
            name="vendorPassword"
            class="vendor-login-input"
            type="password"
            placeholder="Enter password"
            autocomplete="current-password"
            required
          />

          <button id="verifyBtn" class="vendor-login-btn" type="submit">
            Verify
          </button>

          <p id="message" class="vendor-login-message" role="status"></p>
        </form>

      </section>
    </div>

    <div class="app">
      <aside class="sidebar" aria-label="Vendor navigation">
        <div class="brand">
          <div class="brand__dot" aria-hidden="true"></div>
          <div class="brand__title">Vendor</div>
        </div>

        <nav class="nav" role="navigation">
          <button class="nav__item is-active" type="button" data-view="vendor-management">
            Vendor Management
          </button>
          <button class="nav__item" type="button" data-view="vendor-spreadsheet">
            Vendor Spreadsheet
          </button>
          <button class="nav__item" type="button" data-view="vendor-rate">
            Rate
          </button>
        </nav>


        <div class="sidebar__footer">
          <button class="link-btn" id="changePasswordBtn" type="button">
            Change password
          </button>
          <button class="link-btn" id="logoutBtn" type="button">
            Log out
          </button>
        </div>

      </aside>

      <main class="content">
        <header class="topbar">
          <div class="topbar__left">
            <h1 class="topbar__title" id="pageTitle">Vendor Management</h1>
            <p class="topbar__subtitle">Select an option from the left panel.</p>
          </div>

          <div class="topbar__right">
            <div class="pill" id="statusPill">Ready</div>
          </div>
        </header>

        <section class="panel" aria-live="polite">
          <div class="panel__inner">
            <div id="viewContainer">
              <!-- injected by vendor_panel.js -->
            </div>


          </div>
        </section>

      </main>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script type="module" src="./vendor_panel.js"></script>

    <noscript>
      <meta http-equiv="refresh" content="0; url=./index.html" />
    </noscript>
  </body>
</html>
